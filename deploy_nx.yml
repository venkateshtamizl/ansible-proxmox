- name: Deploy NX VM
  hosts: proxmox
  gather_facts: no
  vars_files:
    - vms.yml
    - secrets.yml
    
  vars_prompt:
    - name: vmid
      prompt: "Enter VM ID (e.g. 101)"
      private: no
      
    - name: vm_name
      prompt: "Enter VM Name (e.g. NX-01)"
      private: no

  vars:
    iso_dest_dir: "/var/lib/vz/template/iso"
    iso_src_dir: "/root/ansible-proxmox/templates"
    required_isos:
      - DeploySystem_x64.iso
      - Virtio-Win-0.1.240.iso
    required_ova:
      - "20250819 REV7 TPL_VISICS-UBUNTU24.ova"

  tasks:

    # ─── ISO CHECK & COPY ─────────────────────────────────────────────────────

    - name: Check if ISOs exist on Proxmox
      ansible.builtin.stat:
        path: "{{ iso_dest_dir }}/{{ item }}"
      loop: "{{ required_isos }}"
      register: iso_stat

    - name: Copy missing ISOs to Proxmox
      ansible.builtin.copy:
        src: "{{ iso_src_dir }}/{{ item.item }}"
        dest: "{{ iso_dest_dir }}/{{ item.item }}"
        mode: '0644'
      loop: "{{ iso_stat.results }}"
      when: not item.stat.exists
    # ─── OVA CHECK & COPY ─────────────────────────────────────────────────────

 # ─── OVA CHECK & COPY ─────────────────────────────────────────────────────
    - name: Check if OVA exists on Proxmox
      ansible.builtin.stat:
        path: "/root/{{ item }}"
      loop: "{{ required_ova }}"
      register: ova_stat

    - name: Copy OVA to Proxmox if missing
      ansible.builtin.copy:
        src: "{{ iso_src_dir }}/{{ item.item }}"
        dest: "/root/{{ item.item }}"
        mode: '0644'
      loop: "{{ ova_stat.results }}"
      when: not item.stat.exists

    # ─── VM EXISTS CHECK ──────────────────────────────────────────────────────

    - name: Check if VM already exists
      ansible.builtin.command: qm status {{ vmid }}
      register: vm_status
      ignore_errors: yes
      failed_when: false

    # ─── VM CREATION ────────────────────────────────────────────────────────

    - name: Create VM
      ansible.builtin.command: >
        qm create {{ vmid }}
        --name {{ vm_name }}
        --memory {{ nx_vms[0].ram }}
        --sockets {{ nx_vms[0].sockets }}
        --cores {{ nx_vms[0].cores }}
        --cpu x86-64-v2-AES
        --bios seabios
        --scsihw virtio-scsi-single
        --scsi0 local-lvm:{{ nx_vms[0].disk }}
        --ide2 local:iso/DeploySystem_x64.iso,media=cdrom
        --net0 virtio,bridge=vmbr0,tag=999
        --boot order=scsi0
        --agent 1
        --onboot 1
      when: vm_status.rc != 0

    # ─── DISK RESIZE ──────────────────────────────────────────────────────────

    - name: Resize disk
      ansible.builtin.command: >
        qm resize {{ vmid }} scsi0 {{ nx_vms[0].disk }}G
      ignore_errors: yes
