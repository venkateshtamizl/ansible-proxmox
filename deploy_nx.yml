- name: Deploy NX VM
  hosts: proxmox
  gather_facts: no
  vars_files:
    - vms.yml
    - secrets.yml
    
  vars_prompt:
    - name: vmid
      prompt: "Enter VM ID (e.g. 101)"
      private: no
      
    - name: vm_name
      prompt: "Enter VM Name (e.g. NX-01)"
      private: no
      

  vars:
    iso_dest_dir: "/var/lib/vz/template/iso"
    iso_src_dir: "/root/ansible-proxmox/templates"
    required_isos:
      - DeploySystem_x64.iso
      - Virtio-Win-0.1.240.iso
    required_ova:
      - "testubuntu.ova"

  tasks:
    
    ## ─── ISO CHECK & COPY ─────────────────────────────────────────────────────

    - name: Check if ISOs exist on Proxmox
      ansible.builtin.stat:
        path: "{{ iso_dest_dir }}/{{ item }}"
      loop: "{{ required_isos }}"
      register: iso_stat

    - name: Copy missing ISOs to Proxmox
      ansible.builtin.copy:
        src: "{{ iso_src_dir }}/{{ item.item }}"
        dest: "{{ iso_dest_dir }}/{{ item.item }}"
        mode: '0644'
      loop: "{{ iso_stat.results }}"
      when: not item.stat.exists

 # ─── OVA CHECK & COPY ─────────────────────────────────────────────────────
    - name: Check if OVA exists on Proxmox
      ansible.builtin.stat:
        path: "/root/{{ item }}"
      loop: "{{ required_ova }}"
      register: ova_stat

    - name: Copy OVA to Proxmox if missing
      ansible.builtin.copy:
        src: "{{ iso_src_dir }}/{{ item.item }}"
        dest: "/root/{{ item.item }}"
        mode: '0644'
      loop: "{{ ova_stat.results }}"
      when: not item.stat.exists
      
      
  # ─── EXTRACT OVA ──────────────────────────────────────────────────────────
    - name: Create extraction directory
      ansible.builtin.file:
        path: "/root/extracted_ova"
        state: directory
        mode: '0755'

    - name: Extract OVA file
      ansible.builtin.command: >
        tar -xf "/root/{{ item }}" -C "/root/extracted_ova"
      loop: "{{ required_ova }}"
      
      
  # ─── FIND VMDK ────────────────────────────────────────────────────────────
    - name: Find VMDK file inside extracted folder
      ansible.builtin.find:
        paths: "/root/extracted_ova"
        patterns: "*.vmdk"
      register: vmdk_found

    - name: Show VMDK found
      ansible.builtin.debug:
        msg: "VMDK found: {{ vmdk_found.files[0].path }}"
      when: vmdk_found.files | length > 0

    - name: Fail if no VMDK found
      ansible.builtin.fail:
        msg: "No VMDK found in /root/extracted_ova — OVA extraction may have failed"
      when: vmdk_found.files | length == 0

    # ─── VM EXISTS CHECK ──────────────────────────────────────────────────────

    - name: Check if VM already exists
      ansible.builtin.command: qm status {{ vmid }}
      register: vm_status
      failed_when: false

    # ─── CREATE VM SKELETON ───────────────────────────────────────────────────
    - name: Create VM skeleton
      ansible.builtin.command: >
        qm create {{ vmid }}
        --name {{ vm_name }}
        --memory {{ nx_vms[0].ram }}
        --sockets {{ nx_vms[0].sockets }}
        --cores {{ nx_vms[0].cores }}
        --cpu x86-64-v2-AES
        --numa 0
        --bios seabios
        --scsihw virtio-scsi-single
        --net0 virtio,bridge=vmbr0,tag=999
        --kvm 1
        --onboot 1
        --agent enabled=1
      when: vm_status.rc != 0
      
    # ─── CONVERT VMDK TO QCOW2 ───────────────────────────────────────────────
    - name: Convert VMDK to QCOW2
      ansible.builtin.command: >
        qemu-img convert
        -f vmdk
        -O qcow2
        "{{ vmdk_found.files[0].path }}"
        "/root/extracted_ova/vm-{{ vmid }}-disk-1.qcow2"
      args:
        creates: "/root/extracted_ova/vm-{{ vmid }}-disk-1.qcow2"
        
    # ─── IMPORT DISK INTO PROXMOX STORAGE ────────────────────────────────────
    - name: Import QCOW2 disk into Proxmox storage
      ansible.builtin.command: >
        qm importdisk {{ vmid }}
        "/root/extracted_ova/vm-{{ vmid }}-disk-1.qcow2"
        local-lvm
        --format qcow2
      register: import_result
      
    # ─── ATTACH DISK TO VM ───────────────────────────────────────────────────
    - name: Get unused disk from VM config
      ansible.builtin.shell: >
        qm config {{ vmid }} | grep "^unused0:" | awk '{print $2}'
      register: unused_disk
      failed_when: unused_disk.stdout == ""

    - name: Show unused disk found
      ansible.builtin.debug:
        msg: "Unused disk found: {{ unused_disk.stdout }}"

    - name: Attach disk to VM as virtio0
      ansible.builtin.command: >
        qm set {{ vmid }}
        --virtio0 {{ unused_disk.stdout }},discard=on,iothread=1
        
    # ─── RESIZE DISK + SET BOOT ORDER ────────────────────────────────────────
    - name: Resize disk to target size
      ansible.builtin.command: >
        qm resize {{ vmid }} virtio0 {{ nx_vms[0].disk }}G
      ignore_errors: yes

    - name: Set boot order to virtio0
      ansible.builtin.command: >
        qm set {{ vmid }} --boot order=virtio0
    # ─── CLEANUP EXTRACTED FILES ──────────────────────────────────────────────
    - name: Remove extracted OVA folder
      ansible.builtin.file:
        path: "/root/extracted_ova"
        state: absent
    # ADDED
    # ─── START VM ────────────────────────────────────────────────────────
    - name: Start VM
      ansible.builtin.command: qm start {{ vmid }}
      
    ## ─── WAIT FOR QEMU AGENT ──────────────────────────────────────────────
    - name: Wait for QEMU agent to respond
      ansible.builtin.command: qm agent {{ vmid }} ping
      register: agent_ping
      until: agent_ping.rc == 0
      retries: 30
      delay: 10
      failed_when: false

    ## ─── WAIT FOR VM TO GET IP ────────────────────────────────────────────
    - name: Wait for VM to get DHCP IP
      ansible.builtin.pause:
        seconds: 30

    # ─── GET VM IP ────────────────────────────────────────────────────────
    - name: Get VM IP address
      ansible.builtin.shell: >
        qm agent {{ vmid }} network-get-interfaces |
        python3 -c "import json,sys; d=json.load(sys.stdin);
        [print(a['ip-address']) for i in d if i['name']=='ens18'
        for a in i['ip-addresses'] if a['ip-address-type']=='ipv4']"
      register: vm_ip

    - name: Show VM IP
      ansible.builtin.debug:
        msg: "VM IP is: {{ vm_ip.stdout }}"

    - name: Fail if IP not found
      ansible.builtin.fail:
        msg: "Could not get VM IP — check DHCP or QEMU agent"
      when: vm_ip.stdout == ""

    # ─── ADD VM TO INVENTORY ──────────────────────────────────────────────
    - name: Add VM to inventory
      ansible.builtin.add_host:
        name: "{{ vm_ip.stdout }}"
        groups: new_vm
        ansible_user: root
        ansible_ssh_pass: "{{ vm_ssh_password }}"
        ansible_host: "{{ vm_ip.stdout }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o PasswordAuthentication=yes'
        ansible_python_interpreter: /usr/bin/python3.12
        vm_name: "{{ vm_name }}"
    # ═══════════════════════════════════════════════════════
# SECOND PLAY — runs directly ON the VM
# ═══════════════════════════════════════════════════════
- name: Configure NX VM
  hosts: new_vm
  gather_facts: no
  vars_files:
    - secrets.yml
  vars:
    ansible_python_interpreter: /usr/bin/python3.12

  tasks:

    ## ─── WAIT FOR SSH ─────────────────────────────────────────────────────
    - name: Wait for SSH port to be open
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        timeout: 300
        delay: 10
      delegate_to: localhost
      vars:
        ansible_python_interpreter: /usr/bin/python3

    # ─── TEST SSH CONNECTION ───────────────────────────────────────────────
    - name: Test SSH connection
      ansible.builtin.ping:
      
    # ─── SET HOSTNAME ─────────────────────────────────────────────────────
    - name: Set VM hostname
      ansible.builtin.hostname:
        name: "{{ hostvars[inventory_hostname]['vm_name'] }}"

    # ─── COPY SCRIPT TO VM ────────────────────────────────────────────────
    - name: Copy configure script to VM
      ansible.builtin.copy:
        src: "/root/ansible-proxmox/templates/configure_vm.sh"
        dest: "/root/configure_vm.sh"
        mode: '0755'

    # ─── RUN SCRIPT ───────────────────────────────────────────────────────
    - name: Run configuration script
      ansible.builtin.shell: /root/configure_vm.sh {{ hostvars[inventory_hostname]['vm_name'] }}
      async: 120
      poll: 0
      ignore_errors: yes

    # ─── WAIT FOR VM TO GO DOWN ───────────────────────────────────────────
    - name: Wait for VM to reboot
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        state: stopped
        timeout: 60
        delay: 10
      delegate_to: localhost
      vars:
        ansible_python_interpreter: /usr/bin/python3

    # ─── WAIT FOR VM TO COME BACK ─────────────────────────────────────────
    - name: Wait for VM to come back online
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        state: started
        timeout: 180
        delay: 30
      delegate_to: localhost
      vars:
        ansible_python_interpreter: /usr/bin/python3

    # ─── VERIFY AFTER REBOOT ──────────────────────────────────────────────
    - name: Verify hostname after reboot
      ansible.builtin.command: hostname
      register: hostname_result

    - name: Show hostname
      ansible.builtin.debug:
        msg: "VM hostname is: {{ hostname_result.stdout }}"